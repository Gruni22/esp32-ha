[env:esp32-s3]
platform = espressif32
; Waveshare ESP32-S3-Zero: ESP32-S3FH4R2 — 4MB QIO Flash + 2MB QIO PSRAM
board = esp32-s3-fh4r2
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    h2zero/NimBLE-Arduino@^2.1.0

build_flags =
    -DCONFIG_BT_NIMBLE_ENABLED=1
    -DCONFIG_BT_NIMBLE_EXT_ADV=0

; ── OTA upload: connect PC to "ESP32-HA-OTA" WiFi, then use this env ─────────
; 1. Press "Enable OTA" button in Home Assistant
; 2. Connect your PC to WiFi "ESP32-HA-OTA"
; 3. Run: pio run -e esp32-s3-ota -t upload
[env:esp32-s3-ota]
extends = env:esp32-s3
upload_protocol = espota
upload_port = 192.168.200.1

